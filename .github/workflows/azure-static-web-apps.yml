name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3

      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # Point to your Next.js frontend workspace
          app_location: "frontend"
          # If you have an API folder, set it here; otherwise leave blank
          api_location: ""
          # Next.js build output folder
          output_location: ".next"
          # Explicitly tell Oryx how to build
          app_build_command: "npm run build --workspace frontend"
