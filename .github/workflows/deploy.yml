name: Deploy OpenClaw Dashboard

on:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.OPENCLAW_DASHBOARD }}
      AZURE_OPENAI_KEY: ${{ secrets.OPENCLAW_DASHBOARD }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.OPENCLAW_DASHBOARD }}
      MOLTBOOK_KEY: ${{ secrets.OPENCLAW_DASHBOARD }}
      AZURE_CLIENT_ID: ${{ secrets.OPENCLAW_DASHBOARD }}
      AZURE_TENANT_ID: ${{ secrets.OPENCLAW_DASHBOARD }}
      AZURE_CLIENT_SECRET: ${{ secrets.OPENCLAW_DASHBOARD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: false   # disable submodule fetching
          fetch-depth: 0      # full history

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: openclaw-backend
          slot-name: production
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
          package: backend

      - name: Configure environment variables
        uses: azure/appservice-settings@v1
        with:
          app-name: openclaw-backend
          resource-group: openclaw-rg
          settings: |
            MOLTBOOK_KEY=dummy
            AZURE_OPENAI_KEY=${{ env.AZURE_OPENAI_KEY }}
            AZURE_OPENAI_ENDPOINT=${{ env.AZURE_OPENAI_ENDPOINT }}

  frontend:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.OPENCLAW_DASHBOARD }}
      AZURE_OPENAI_KEY: ${{ secrets.OPENCLAW_DASHBOARD }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.OPENCLAW_DASHBOARD }}
      MOLTBOOK_KEY: ${{ secrets.OPENCLAW_DASHBOARD }}
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.OPENCLAW_DASHBOARD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: false
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build Next.js app
        run: |
          cd frontend
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          output_location: ".next"
