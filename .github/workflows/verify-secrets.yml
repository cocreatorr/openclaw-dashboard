name: Verify GitHub Secrets

on:
  workflow_dispatch:   # allows you to run it manually from the Actions tab

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Verify secrets exist
        run: |
          if [ -z "$MOLTBOOK_KEY" ]; then
            echo "❌ MOLTBOOK_KEY is missing"
            exit 1
          else
            echo "✅ MOLTBOOK_KEY is set"
          fi

          if [ -z "$AZURE_OPENAI_KEY" ]; then
            echo "❌ AZURE_OPENAI_KEY is missing"
            exit 1
          else
            echo "✅ AZURE_OPENAI_KEY is set"
          fi

          if [ -z "$AZURE_OPENAI_ENDPOINT" ]; then
            echo "❌ AZURE_OPENAI_ENDPOINT is missing"
            exit 1
          else
            echo "✅ AZURE_OPENAI_ENDPOINT is set"
          fi

          if [ -z "$AZURE_CREDENTIALS" ]; then
            echo "❌ AZURE_CREDENTIALS is missing"
            exit 1
          else
            echo "✅ AZURE_CREDENTIALS is set"
          fi

          if [ -z "$AZURE_STATIC_WEB_APPS_API_TOKEN" ]; then
            echo "❌ AZURE_STATIC_WEB_APPS_API_TOKEN is missing"
            exit 1
          else
            echo "✅ AZURE_STATIC_WEB_APPS_API_TOKEN is set"
          fi
        env:
          MOLTBOOK_KEY: ${{ secrets.MOLTBOOK_KEY }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
